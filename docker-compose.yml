services:
  discourse-assignee-automation:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: discourse-assignee-automation
    env_file:
      - .env
    volumes:
      - discourse_assignee_state:/data
    ports:
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  discourse_assignee_state:
    driver: local
